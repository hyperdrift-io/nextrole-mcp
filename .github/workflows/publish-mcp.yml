name: Publish to MCP Registry
run-name: Publish io.github.hyperdrift-io/nextrole → MCP Registry

on:
  push:
    branches: [master]
    paths: ['server.json']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for GitHub OIDC auth to the registry

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
